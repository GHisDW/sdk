name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue in **TenantScale SDK**! We appreciate your help in making multi-tenant B2B SaaS better for everyone.

            Please make sure to check our [Contributing Guide](https://github.com/TenantScale/sdk/blob/main/CONTRIBUTING.md).
          pr-message: |
            🎉 Thanks for opening your first pull request in **TenantScale SDK**! We'll review it as soon as possible.

            Quick checklist:
            - ✅ Commits have DCO sign-off (`git commit -s`)
            - ✅ `pnpm test` and `pnpm build` pass locally
            - ✅ Tests updated for new functionality

            Welcome to the community! 🚀
